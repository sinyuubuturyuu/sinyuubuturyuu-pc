<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>シンユウ物流パソコン用</title>
  <meta name="description" content="月次タイヤ点検表と月次日常点検表の統合ランチャー">
  <link rel="icon" href="./ChatGPT Image 2026年3月14日 23_38_32.png" type="image/png">
  <link rel="apple-touch-icon" href="./ChatGPT Image 2026年3月14日 23_38_32.png">
  <link rel="stylesheet" href="./shell.css">
</head>
<body class="shell-body">
  <main class="shell-page">
    <section class="shell-card home-card">
      <img
        class="shell-logo"
        src="./ChatGPT Image 2026年3月14日 23_38_32.png"
        alt="シンユウ物流パソコン用"
      >
      <div class="shell-copy">
        <h1>シンユウ物流パソコン用</h1>
      </div>

      <nav class="home-actions" aria-label="アプリ選択">
        <a id="tireInspectionButton" class="action-button primary" href="./getujityretenkenhyou-pc/index.html">月次タイヤ点検表</a>
        <a id="dailyInspectionButton" class="action-button primary" href="./getujinitijyoutenkenhyou-pc/index.html">月次日常点検表</a>
        <a class="action-button secondary" href="./settings.html">設定</a>
      </nav>
    </section>
  </main>

  <script>
    (function () {
      const tireInspectionButton = document.getElementById("tireInspectionButton");
      const dailyInspectionButton = document.getElementById("dailyInspectionButton");

      exitFullscreenIfNeeded();
      bindFullscreenNavigation(tireInspectionButton);
      bindFullscreenNavigation(dailyInspectionButton);

      function bindFullscreenNavigation(link) {
        if (!link) {
          return;
        }

        link.addEventListener("click", function (event) {
          event.preventDefault();
          openInFullscreen(link.href);
        });
      }

      async function openInFullscreen(targetUrl) {
        try {
          if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
          }
        } catch (error) {
          console.warn("Failed to enter fullscreen:", error);
        } finally {
          window.location.href = targetUrl;
        }
      }

      async function exitFullscreenIfNeeded() {
        try {
          if (document.fullscreenElement && document.exitFullscreen) {
            await document.exitFullscreen();
          }
        } catch (error) {
          console.warn("Failed to exit fullscreen:", error);
        }
      }
    })();
  </script>
</body>
</html>
