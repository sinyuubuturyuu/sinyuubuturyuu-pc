<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>設定 | シンユウ物流パソコン用</title>
  <meta name="description" content="車両番号と運転者名の共通設定">
  <link rel="icon" href="./icon-sinyuubuturyuu-pc.png" type="image/png">
  <link rel="apple-touch-icon" href="./icon-sinyuubuturyuu-pc.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="./shell.css">
</head>
<body class="shell-body">
  <main class="shell-page">
    <section class="shell-card settings-card">
      <div class="settings-topbar">
        <a class="back-link" href="./index.html">トップへ戻る</a>
        <h1>設定</h1>
      </div>

      <div class="settings-grid">
        <section class="settings-section" aria-labelledby="vehicleHeading">
          <div class="section-head">
            <h2 id="vehicleHeading">車両番号</h2>
            <p>追加した候補は2つのアプリで共通利用できます。</p>
          </div>

          <label class="field">
            <span>車両番号を追加</span>
            <div class="field-row">
              <input id="vehicleInput" type="text" autocomplete="off" placeholder="例: 品川 500 あ 1234">
              <button id="addVehicleButton" class="mini-button primary" type="button">追加</button>
            </div>
          </label>

          <div class="button-row">
            <button id="saveVehiclesButton" class="mini-button" type="button">保存</button>
            <button id="restoreVehiclesButton" class="mini-button" type="button">復元</button>
            <button id="deleteVehiclesButton" class="mini-button danger" type="button">削除</button>
          </div>

          <div class="field">
            <span>追加済み車両番号</span>
            <div id="vehicleList" class="value-list" aria-live="polite"></div>
          </div>

          <p id="vehicleLocalStatus" class="status-text" aria-live="polite"></p>
          <p id="vehicleBackupStatus" class="status-text" aria-live="polite"></p>
        </section>

        <section class="settings-section" aria-labelledby="driverHeading">
          <div class="section-head">
            <h2 id="driverHeading">運転者名</h2>
            <p>名前と読みを登録できます。読みは並び替えや検索に利用されます。</p>
          </div>

          <label class="field">
            <span>運転者名を追加</span>
            <div class="field-column">
              <input id="driverNameInput" type="text" autocomplete="off" placeholder="運転者名">
              <input id="driverReadingInput" type="text" autocomplete="off" placeholder="読み">
            </div>
            <button id="addDriverButton" class="mini-button primary align-start" type="button">追加</button>
          </label>

          <div class="button-row">
            <button id="saveDriversButton" class="mini-button" type="button">保存</button>
            <button id="restoreDriversButton" class="mini-button" type="button">復元</button>
            <button id="deleteDriversButton" class="mini-button danger" type="button">削除</button>
          </div>

          <div class="field">
            <span>追加済み運転者名</span>
            <div id="driverList" class="value-list" aria-live="polite"></div>
          </div>

          <p id="driverLocalStatus" class="status-text" aria-live="polite"></p>
          <p id="driverBackupStatus" class="status-text" aria-live="polite"></p>
        </section>
      </div>

      <p id="globalStatus" class="global-status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    (function () {
      if (!("serviceWorker" in navigator)) {
        return;
      }

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function (error) {
          console.warn("Failed to register service worker:", error);
        });
      });
    })();
  </script>
  <script src="./shared-settings.js"></script>
  <script src="./getujityretenkenhyou-pc/firebase/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="./settings.js"></script>
</body>
</html>
